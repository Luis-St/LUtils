name: Compile, test and build documentation on pull request

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: read
  pull-requests: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5.0.0
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 'Grant Permission to Gradle'
        run: chmod +x gradlew
      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v4.4.3
      - name: 'License check with Gradle'
        run: ./gradlew checkLicenses
  compile:
    needs: license-check
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5.0.0
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 'Grant Permission to Gradle'
        run: chmod +x gradlew
      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v4.4.3
      - name: 'Compile with Gradle'
        run: ./gradlew classes # Use classes instead of build to not make the test task redundant
  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5.0.0
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 'Grant Permission to Gradle'
        run: chmod +x gradlew
      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v4.4.3
      - name: 'Verify Docker is available for Testcontainers'
        run: docker info
      - name: 'Test with Gradle'
        run: ./gradlew test
      - name: 'Upload test results'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/reports/tests/test
            build/test-results/test
          retention-days: 30
  build-docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5.0.0
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 'Grant Permission to Gradle'
        run: chmod +x gradlew
      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v4.4.3
      - name: 'Build documentation with Gradle'
        run: ./gradlew javadoc
