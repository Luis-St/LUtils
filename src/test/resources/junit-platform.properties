# Enable JUnit 5 parallel test execution.
junit.jupiter.execution.parallel.enabled=true

# Run test classes in parallel, but keep methods within a class on the same
# thread by default. This avoids contention on per-class fixtures/shared state
# while still parallelizing across classes. Opt individual classes/methods into
# concurrent method execution with @Execution(ExecutionMode.CONCURRENT).
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Parallelism scales with the number of available processors.
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1.0
