# _config.yaml
# Example global configuration for LUtils-DB schema

config:
  # Default schema for all entities (can be overridden per entity)
  defaultSchema: public

  # Naming conventions
  naming:
    table: snake_case      # Java class UserProfile -> table user_profile
    column: snake_case     # Java field createdAt -> column created_at
    entity: PascalCase     # YAML entity user_profile -> Java class UserProfile
    field: camelCase       # YAML field created_at -> Java field createdAt

  # Default field options (can be overridden per field)
  defaults:
    nullable: false        # Fields are NOT NULL by default
    updatable: true        # Fields can be updated by default
    insertable: true       # Fields can be inserted by default

  # Row type configuration for projections
  rows:
    maxCount: 8            # Generate Row2 through Row8 (default: 8)

  # Soft delete configuration (disabled by default)
  softDelete:
    enabled: false
    column: deleted_at
    type: Instant

# Note: Audit configuration is per-table only in v3
# See individual entity files for audit settings

# Example entity with audit (for reference):
#
# entity: User
# table: users
#
# audit:
#   createdAt:
#     column: created_at
#     type: Instant
#   updatedAt:
#     column: updated_at
#     type: Instant
#   createdBy:
#     column: created_by
#     type: String
#   updatedBy:
#     column: updated_by
#     type: String
#
# fields:
#   id:
#     type: UUID
#     primary: true
#     generated: true
#   ...
