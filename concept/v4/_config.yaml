# _config.yaml - Global configuration for LUtils-DB v4

config:
  defaultSchema: public

  naming:
    table: snake_case      # UserProfile -> user_profile
    column: snake_case     # createdAt -> created_at
    entity: PascalCase     # user_profile -> UserProfile
    field: camelCase       # created_at -> createdAt

  defaults:
    nullable: false
    updatable: true
    insertable: true

  rows:
    maxCount: 8            # Generate Row2 through Row8

  softDelete:
    enabled: false
    column: deleted_at
    type: Instant

# Audit is per-table only (no global defaults)
