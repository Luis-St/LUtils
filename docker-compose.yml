services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "3000:5432"
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      MYSQL_DATABASE: test
    ports:
      - "3001:3306"
  mariadb:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: test
      MARIADB_USER: test
      MARIADB_PASSWORD: test
      MARIADB_DATABASE: test
    ports:
      - "3002:3306"
